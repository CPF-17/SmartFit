    <text x="126" y="405" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#34c759">T</text>
    <text x="152" y="405" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#636366">F</text>
