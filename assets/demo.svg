    <text x="38" y="254" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="white">Legs</text>
    <text x="38" y="271" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">45%</text>
    <rect x="38" y="288" width="80" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="38" y="288" height="6" rx="3" fill="#ff9500" class="bar-legs"/>
    <rect x="142" y="234" width="104" height="66" rx="10" fill="#1a1a22"/>
    <rect x="142" y="234" width="104" height="3" rx="2" fill="#af52de"/>
    <text x="154" y="254" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="white">Back</text>
    <text x="154" y="271" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">80%</text>
    <rect x="154" y="288" width="80" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="154" y="288" height="6" rx="3" fill="#af52de" class="bar-back"/>
    <rect x="26" y="310" width="104" height="66" rx="10" fill="#1a1a22"/>
    <rect x="26" y="310" width="104" height="3" rx="2" fill="#ff3b30"/>
    <text x="38" y="330" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="white">Abs</text>
    <text x="38" y="347" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">50%</text>
    <rect x="38" y="364" width="80" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="38" y="364" height="6" rx="3" fill="#ff3b30" class="bar-abs"/>
    <rect x="142" y="310" width="104" height="66" rx="10" fill="#1a1a22"/>
    <rect x="142" y="310" width="104" height="3" rx="2" fill="#5ac8fa"/>
    <text x="154" y="330" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="white">Cardio</text>
    <text x="154" y="347" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">35%</text>
    <rect x="154" y="364" width="80" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="154" y="364" height="6" rx="3" fill="#5ac8fa" class="bar-cardio"/>
    <rect x="20" y="430" width="240" height="80" fill="#1a1a22"/>
    <line x1="20" y1="430" x2="260" y2="430" stroke="#2a2a3a" stroke-width="1"/>
    <text x="61" y="452" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="white">2,340</text>
    <text x="61" y="470" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#48484a">kcal</text>
    <text x="140" y="452" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="white">47</text>
    <text x="140" y="470" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#48484a">min</text>
    <text x="219" y="452" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="white">8,432</text>
    <text x="219" y="470" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#48484a">steps</text>
  </g>
  <g id="s-stats" opacity="0" clip-path="url(#screen)">
    <text x="30" y="72" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="white">9:41</text>
    <text x="30" y="102" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="white">Progress</text>
    <text x="30" y="122" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#48484a" letter-spacing=".8">WEEKLY OVERVIEW</text>
    <rect x="26" y="132" width="228" height="46" rx="10" fill="#1a1a22"/>
    <rect x="26" y="132" width="4" height="46" rx="2" fill="#34c759"/>
    <text x="42" y="152" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="white">12,840</text>
    <text x="42" y="169" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">Total kcal</text>
    <rect x="182" y="151" width="60" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="182" y="151" height="6" rx="3" fill="#34c759" class="sbar-k"/>
    <rect x="26" y="188" width="228" height="46" rx="10" fill="#1a1a22"/>
    <rect x="26" y="188" width="4" height="46" rx="2" fill="#007aff"/>
    <text x="42" y="208" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="white">5h 32m</text>
    <text x="42" y="225" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">Active time</text>
    <rect x="182" y="207" width="60" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="182" y="207" height="6" rx="3" fill="#007aff" class="sbar-t"/>
    <rect x="26" y="244" width="228" height="46" rx="10" fill="#1a1a22"/>
    <rect x="26" y="244" width="4" height="46" rx="2" fill="#ff9500"/>
    <text x="42" y="264" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="white">47,210</text>
    <text x="42" y="281" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#636366">Steps</text>
    <rect x="182" y="263" width="60" height="6" rx="3" fill="#2a2a3a"/>
    <rect x="182" y="263" height="6" rx="3" fill="#ff9500" class="sbar-s"/>
    <text x="30" y="310" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#48484a" letter-spacing=".8">DAILY ACTIVITY</text>
    <rect x="26" y="318" width="228" height="76" rx="6" fill="#1a1a22"/>
    <rect class="cbar cbar-1" x="38" y="344" width="20" height="50" rx="3" fill="#2a2a3a"/>
    <rect class="cbar cbar-2" x="64" y="332" width="20" height="62" rx="3" fill="#2a2a3a"/>
    <rect class="cbar cbar-3" x="90" y="358" width="20" height="36" rx="3" fill="#2a2a3a"/>
    <rect class="cbar cbar-4" x="116" y="324" width="20" height="70" rx="3" fill="#34c759"/>
    <rect class="cbar cbar-5" x="142" y="340" width="20" height="54" rx="3" fill="#2a2a3a"/>
    <rect class="cbar cbar-6" x="168" y="350" width="20" height="44" rx="3" fill="#2a2a3a"/>
    <rect class="cbar cbar-7" x="194" y="362" width="20" height="32" rx="3" fill="#2a2a3a"/>
    <text x="48" y="405" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#636366">M</text>
    <text x="74" y="405" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#636366">T</text>
